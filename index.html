<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Naminori — いまここ道具箱</title>
  <style>
    :root {
      --bg: #faf7f4;
      --surface: #fff;
      --primary: #c07030;
      --primary-light: #f5ebe0;
      --text: #2d2520;
      --text-muted: #8a7a70;
      --border: #e8ddd5;
      --shadow: 0 4px 20px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.15);
      --radius: 20px;
      --card-w: min(360px, calc(100vw - 48px));
      --card-h: min(520px, calc(100svh - 220px));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .app-header {
      width: 100%; padding: 18px 24px 10px;
      text-align: center; flex-shrink: 0;
    }
    .app-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; }
    .app-sub { font-weight: 400; font-size: 0.8em; opacity: 0.7; }
    .app-time { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

    #app { width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; }

    /* ── Common helpers ── */
    .screen-inner {
      width: 100%; max-width: 440px;
      padding: 8px 24px 36px;
      display: flex; flex-direction: column; align-items: center;
    }
    .screen-label {
      font-size: 1.1rem; font-weight: 600; color: var(--text);
      margin-bottom: 24px; text-align: center; line-height: 1.5;
    }
    .screen-back {
      width: 100%; margin-bottom: 12px;
    }
    .back-link {
      background: none; border: none; color: var(--primary);
      font-size: 0.9rem; font-weight: 600; cursor: pointer; padding: 4px 0;
      display: flex; align-items: center; gap: 4px;
    }
    .back-link:hover { text-decoration: underline; }

    .primary-btn {
      padding: 16px 32px; background: var(--primary); color: #fff;
      border: none; border-radius: 50px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: transform 0.15s, background 0.15s; width: 100%; max-width: 280px;
    }
    .primary-btn:hover { background: #a06020; }
    .primary-btn:active { transform: scale(0.97); }
    .secondary-btn {
      padding: 12px 24px; background: transparent; color: var(--text-muted);
      border: 2px solid var(--border); border-radius: 50px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s; width: 100%; max-width: 280px;
    }
    .secondary-btn:hover { border-color: var(--primary); color: var(--primary); }
    .secondary-btn:active { transform: scale(0.97); }

    /* ══════════════════════
       S1: Welcome Back
    ══════════════════════ */
    #sc-welcome {
      flex-direction: column; align-items: center;
      justify-content: center; min-height: 70svh;
      text-align: center; padding: 32px 24px;
    }
    .wb-emoji { font-size: 4rem; margin-bottom: 20px; }
    .wb-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
    .wb-msg { color: var(--text-muted); line-height: 1.8; margin-bottom: 24px; font-size: 0.95rem; }
    .streak-badge {
      display: none;
      background: var(--primary-light); color: var(--primary);
      border-radius: 50px; padding: 8px 20px;
      font-size: 0.9rem; font-weight: 700;
      margin-bottom: 24px;
    }

    /* ══════════════════════
       S2: Direction
    ══════════════════════ */
    #sc-direction { flex-direction: column; align-items: center; }
    .direction-grid {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column; gap: 16px;
      padding: 0 24px 32px;
    }
    .direction-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 20px; padding: 28px 24px;
      cursor: pointer; text-align: left;
      display: flex; flex-direction: column; gap: 10px;
      transition: all 0.18s; user-select: none;
    }
    .direction-card:hover { border-color: var(--primary); box-shadow: var(--shadow); transform: translateY(-2px); }
    .direction-card:active { transform: scale(0.98); }
    .dir-icon { font-size: 2.4rem; }
    .dir-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .dir-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }

    /* ══════════════════════
       S3: Context
    ══════════════════════ */
    #sc-context { flex-direction: column; align-items: center; }
    .context-grid {
      width: 100%; max-width: 380px;
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; padding: 0 24px 32px;
    }
    .context-btn {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 16px; padding: 16px 8px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      transition: all 0.15s; user-select: none;
    }
    .context-btn:hover { border-color: var(--primary); background: var(--primary-light); }
    .context-btn:active { transform: scale(0.95); }
    .ctx-icon { font-size: 2rem; }
    .ctx-label { font-size: 0.75rem; font-weight: 600; color: var(--text); text-align: center; line-height: 1.3; }

    /* ══════════════════════
       S4: Akinator
    ══════════════════════ */
    #sc-akinator { flex-direction: column; align-items: center; }
    .aki-wrap {
      width: 100%; max-width: 380px;
      padding: 0 24px 32px;
      display: flex; flex-direction: column; align-items: center;
    }
    .aki-step-label {
      font-size: 0.75rem; font-weight: 700; color: var(--primary);
      letter-spacing: 0.08em; margin-bottom: 16px; text-transform: uppercase;
    }
    .aki-question {
      font-size: 1.15rem; font-weight: 600; color: var(--text);
      text-align: center; line-height: 1.6; margin-bottom: 28px;
    }
    .aki-options {
      width: 100%; display: flex; flex-direction: column; gap: 14px;
    }
    .aki-btn {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 16px; padding: 20px 24px;
      font-size: 0.95rem; font-weight: 600; color: var(--text);
      cursor: pointer; text-align: left;
      transition: all 0.15s; user-select: none;
      line-height: 1.4;
    }
    .aki-btn:hover { border-color: var(--primary); background: var(--primary-light); }
    .aki-btn:active { transform: scale(0.98); }
    .aki-btn-neither {
      background: transparent; border: 1px dashed var(--border);
      border-radius: 12px; padding: 12px 20px;
      font-size: 0.85rem; color: var(--text-muted);
      cursor: pointer; text-align: center;
      transition: all 0.15s; user-select: none; width: 100%;
    }
    .aki-btn-neither:hover { border-color: var(--primary); color: var(--primary); }

    .aki-emo-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; width: 100%;
    }
    .aki-emo-btn {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 14px; padding: 16px 6px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 7px;
      transition: all 0.15s; user-select: none;
    }
    .aki-emo-btn:hover { border-color: var(--primary); background: var(--primary-light); }
    .aki-emo-btn:active { transform: scale(0.95); }
    .aki-emo-icon { font-size: 1.9rem; line-height: 1; }
    .aki-emo-label { font-size: 0.73rem; font-weight: 600; color: var(--text); text-align: center; line-height: 1.3; }

    /* ══════════════════════
       S5: Emotion Result
    ══════════════════════ */
    #sc-emotion {
      flex-direction: column; align-items: center;
      justify-content: center; min-height: 60svh;
      text-align: center; padding: 32px 24px;
    }
    .er-icon { font-size: 5rem; margin-bottom: 16px; }
    .er-label { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .er-desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }
    .er-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }

    /* ══════════════════════
       S6: Cards
    ══════════════════════ */
    #sc-cards {
      width: 100%; flex: 1;
      flex-direction: column; align-items: center;
      padding: 0 0 16px;
    }
    .cards-meta {
      font-size: 0.8rem; color: var(--text-muted);
      margin-bottom: 12px; text-align: center; padding: 0 24px;
    }
    .card-stack-wrap {
      position: relative;
      width: var(--card-w); height: var(--card-h);
    }
    .technique-card {
      position: absolute; inset: 0;
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 24px 22px 20px;
      display: flex; flex-direction: column;
      cursor: pointer;
      transform-origin: bottom center;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
      user-select: none; will-change: transform; overflow: hidden;
    }
    .technique-card:nth-last-child(1) { z-index: 3; }
    .technique-card:nth-last-child(2) { z-index: 2; transform: scale(0.95) translateY(12px); pointer-events: none; }
    .technique-card:nth-last-child(3) { z-index: 1; transform: scale(0.90) translateY(24px); pointer-events: none; }
    .technique-card.is-dragging { transition: none; cursor: grabbing; }
    .technique-card.fly-left { transition: transform 0.4s ease-in, opacity 0.4s; transform: translateX(-140%) rotate(-22deg) !important; opacity: 0; }
    .technique-card.fly-right { transition: transform 0.4s ease-in, opacity 0.4s; transform: translateX(140%) rotate(22deg) !important; opacity: 0; }

    .swipe-hint-left, .swipe-hint-right {
      position: absolute; top: 24px;
      border-radius: 8px; padding: 6px 14px;
      font-size: 0.85rem; font-weight: 700;
      pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 10;
    }
    .swipe-hint-left  { left: 16px;  background: #fee; color: #c00; border: 2px solid #c00; transform: rotate(-15deg); }
    .swipe-hint-right { right: 16px; background: #efe; color: #080; border: 2px solid #080; transform: rotate(15deg); }

    .card-approach {
      display: inline-flex; align-items: center;
      font-size: 0.72rem; font-weight: 700;
      padding: 4px 10px; border-radius: 50px;
      margin-bottom: 12px; width: fit-content;
    }
    .card-icon { font-size: 2.6rem; margin-bottom: 10px; line-height: 1; }
    .card-name { font-size: 1.35rem; font-weight: 700; margin-bottom: 8px; }
    .card-tagline { font-size: 0.88rem; line-height: 1.65; color: var(--text-muted); margin-bottom: 14px; }
    .card-step-preview {
      background: var(--primary-light); border-left: 3px solid var(--primary);
      border-radius: 0 8px 8px 0; padding: 10px 12px; flex: 1;
    }
    .card-step-label { font-size: 0.68rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; letter-spacing: 0.04em; }
    .card-step-text { font-size: 0.82rem; line-height: 1.55; color: var(--text); }
    .card-footer { margin-top: 14px; display: flex; align-items: center; justify-content: space-between; }
    .card-duration { font-size: 0.78rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .card-tap-hint { font-size: 0.78rem; color: var(--primary); font-weight: 700; }

    .card-nav { display: flex; align-items: center; gap: 16px; margin-top: 20px; }
    .nav-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 20px; background: var(--surface);
      border: 2px solid var(--border); border-radius: 50px;
      font-size: 0.85rem; font-weight: 600; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s;
    }
    .nav-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .nav-btn:active { transform: scale(0.96); }
    .swipe-guide { margin-top: 8px; font-size: 0.72rem; color: var(--text-muted); text-align: center; }

    .no-more-cards {
      display: none; flex-direction: column; align-items: center;
      padding: 40px 24px; text-align: center;
    }
    .no-more-cards .big-emoji { font-size: 3rem; margin-bottom: 16px; }
    .no-more-cards p { color: var(--text-muted); line-height: 1.8; }
    .retry-btn {
      margin-top: 24px; padding: 14px 32px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 50px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }

    /* ══════════════════════
       S7: Detail
    ══════════════════════ */
    #sc-detail {
      width: 100%; max-width: 540px;
      min-height: 100svh; background: var(--bg);
      padding: 0 0 48px;
      flex-direction: column;
      overflow-y: auto;
    }
    .detail-header {
      background: var(--surface); padding: 16px 24px 18px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .detail-back {
      background: none; border: none; color: var(--primary);
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      padding: 0 0 10px; display: flex; align-items: center; gap: 4px;
    }
    .detail-icon { font-size: 2.8rem; margin-bottom: 10px; line-height: 1; }
    .detail-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .detail-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .detail-body { padding: 0 24px; }
    .detail-tagline {
      margin: 20px 0 0; padding: 16px 20px;
      background: var(--primary-light); border-left: 4px solid var(--primary);
      border-radius: 0 12px 12px 0; font-size: 0.95rem; font-weight: 600;
      line-height: 1.65;
    }
    .detail-section { margin-top: 24px; }
    .detail-section-title {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px;
    }
    .detail-background {
      font-size: 0.88rem; line-height: 1.8; padding: 14px 16px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    }
    .step-item { display: flex; gap: 14px; margin-bottom: 14px; align-items: flex-start; cursor: pointer; }
    .step-item:last-child { margin-bottom: 0; }
    .step-num {
      flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
      background: var(--primary-light); color: var(--primary);
      font-weight: 700; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .step-item.done .step-num { background: var(--primary); color: #fff; }
    .step-item.done .step-text { color: var(--text-muted); text-decoration: line-through; text-decoration-color: #bba; }
    .step-num .check { display: none; }
    .step-item.done .step-num .check { display: block; }
    .step-item.done .step-num .num { display: none; }
    .step-text { font-size: 0.93rem; line-height: 1.75; padding-top: 4px; transition: color 0.2s; }
    .tips-list { list-style: none; }
    .tips-list li {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 10px 14px; margin-bottom: 8px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.88rem; line-height: 1.65;
    }
    .tips-list li::before { content: "💡"; font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .done-btn {
      margin: 28px 0 0; width: 100%;
      padding: 18px; background: var(--primary); color: #fff;
      border: none; border-radius: 50px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: transform 0.15s, background 0.15s;
    }
    .done-btn:hover { background: #a06020; }
    .done-btn:active { transform: scale(0.97); }

    /* ── Badge colors ── */
    .badge-dbt      { background: #fde8d8; color: #c04010; }
    .badge-cbt      { background: #dde8ff; color: #1040b0; }
    .badge-act      { background: #dff0e4; color: #106030; }
    .badge-mind     { background: #e8e0f8; color: #4030a0; }
    .badge-positive { background: #fff0cc; color: #805000; }
    .badge-self     { background: #fce0f0; color: #800050; }
    .badge-behavior { background: #e0f0f8; color: #006080; }
    .badge-record   { background: #f0f0e8; color: #404020; }

    /* ══════════════════════
       S8: Journal
    ══════════════════════ */
    #sc-journal { flex-direction: column; align-items: center; }
    .journal-wrap {
      width: 100%; max-width: 440px;
      padding: 0 24px 36px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .journal-tech-name {
      font-size: 1rem; font-weight: 700; color: var(--primary);
      text-align: center;
    }
    .journal-prompt {
      font-size: 1.05rem; font-weight: 600; text-align: center;
      line-height: 1.6; color: var(--text);
    }
    .journal-warm {
      background: var(--primary-light); border-left: 4px solid var(--primary);
      border-radius: 0 12px 12px 0; padding: 14px 18px;
      font-size: 0.9rem; line-height: 1.7; color: var(--text);
    }
    .journal-textarea {
      width: 100%; min-height: 120px;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      font-family: inherit; font-size: 0.95rem; line-height: 1.7;
      color: var(--text); resize: vertical;
      transition: border-color 0.15s;
    }
    .journal-textarea:focus { outline: none; border-color: var(--primary); }
    .journal-send-btn {
      padding: 14px; background: var(--primary); color: #fff;
      border: none; border-radius: 50px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: transform 0.15s, background 0.15s; width: 100%;
    }
    .journal-send-btn:hover { background: #a06020; }
    .journal-send-btn:active { transform: scale(0.97); }
    .journal-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .journal-response {
      display: none; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      font-size: 0.9rem; line-height: 1.8; color: var(--text);
    }
    .journal-response::before { content: "🌿 Claude "; font-weight: 700; color: var(--primary); }
    .journal-skip-btn {
      padding: 12px; background: transparent; color: var(--text-muted);
      border: none; font-size: 0.9rem; cursor: pointer; text-align: center;
    }
    .journal-skip-btn:hover { color: var(--primary); text-decoration: underline; }

    /* ══════════════════════
       S9: Done
    ══════════════════════ */
    #sc-done {
      flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 32px; text-align: center; min-height: 60svh;
    }
    .done-emoji { font-size: 4rem; margin-bottom: 20px; }
    .done-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; }
    .done-msg { color: var(--text-muted); line-height: 1.8; margin-bottom: 32px; font-size: 0.95rem; }
    .back-home-btn {
      padding: 16px 36px; background: var(--primary); color: #fff;
      border: none; border-radius: 50px; font-size: 1rem; font-weight: 700; cursor: pointer;
    }

    @media (pointer: fine) {
      .swipe-guide::after { content: ' ／ キーボード ← →'; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Naminori <span class="app-sub">いまここ道具箱</span></div>
  <div class="app-time" id="app-time"></div>
</header>

<div id="app">

  <!-- S1: Welcome back -->
  <section id="sc-welcome" style="display:none">
    <div class="wb-emoji" id="wb-emoji"></div>
    <div class="wb-title" id="wb-title"></div>
    <div class="wb-msg" id="wb-msg"></div>
    <div class="streak-badge" id="wb-streak"></div>
    <button class="primary-btn" id="wb-start">始める →</button>
  </section>

  <!-- S2: Direction -->
  <section id="sc-direction" style="display:none">
    <div class="screen-inner" style="padding-top:0">
      <p class="screen-label">今日はどちら？</p>
    </div>
    <div class="direction-grid">
      <button class="direction-card" data-dir="resist">
        <span class="dir-icon">🌊</span>
        <span class="dir-title">衝動に抵抗したい</span>
        <span class="dir-desc">過食・飲酒・タバコ・スマホ・ギャンブルなど、やめたい・止めたい気持ち</span>
      </button>
      <button class="direction-card" data-dir="approach">
        <span class="dir-icon">🌱</span>
        <span class="dir-title">習慣に近づきたい</span>
        <span class="dir-desc">睡眠・運動・ダイエット・勉強・瞑想など、やりたいことを続けたい気持ち</span>
      </button>
    </div>
  </section>

  <!-- S3: Context -->
  <section id="sc-context" style="display:none">
    <div class="screen-inner" style="padding-bottom:0">
      <div class="screen-back">
        <button class="back-link" data-to="direction">← 戻る</button>
      </div>
      <p class="screen-label" id="context-label">テーマを選ぶ</p>
    </div>
    <div class="context-grid" id="context-grid"></div>
  </section>

  <!-- S4: Akinator -->
  <section id="sc-akinator" style="display:none">
    <div class="aki-wrap">
      <div class="screen-back" style="width:100%">
        <button class="back-link" data-to="context">← 戻る</button>
      </div>
      <div class="aki-step-label" id="aki-step">ステップ 1</div>
      <div class="aki-question" id="aki-question"></div>
      <div class="aki-options" id="aki-options"></div>
    </div>
  </section>

  <!-- S5: Emotion result -->
  <section id="sc-emotion" style="display:none">
    <div class="er-icon" id="er-icon"></div>
    <div class="er-label" id="er-label"></div>
    <div class="er-desc">今、こんな気持ちかな？</div>
    <div class="er-buttons">
      <button class="primary-btn" id="er-confirm">そう！カードを見る</button>
      <button class="secondary-btn" id="er-retry">違う、やり直す</button>
    </div>
  </section>

  <!-- S6: Cards -->
  <section id="sc-cards" style="display:none">
    <p class="cards-meta" id="cards-meta"></p>
    <div class="card-stack-wrap" id="card-stack"></div>
    <div class="card-nav" id="card-nav">
      <button class="nav-btn" id="nav-skip">← スキップ</button>
      <button class="nav-btn" id="nav-next">次のカード →</button>
    </div>
    <p class="swipe-guide">ドラッグ・スワイプで次のカードへ</p>
    <div class="no-more-cards" id="no-more-msg">
      <div class="big-emoji">✨</div>
      <p>今日のカードはここまで。<br>また来てね。</p>
      <button class="retry-btn" id="retry-btn">はじめから選ぶ</button>
    </div>
    <div class="no-more-cards" id="load-error-msg" style="display:none">
      <div class="big-emoji">⚠️</div>
      <p>データの読み込みに失敗しました。<br>ページを再読み込みしてください。</p>
      <button class="retry-btn" onclick="location.reload()">再読み込み</button>
    </div>
  </section>

  <!-- S7: Detail -->
  <section id="sc-detail" style="display:none">
    <div class="detail-header">
      <button class="detail-back" id="detail-back-btn">← カードに戻る</button>
      <div class="detail-icon" id="detail-icon"></div>
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-meta">
        <span class="card-approach" id="detail-badge"></span>
        <span class="card-duration" id="detail-duration"></span>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-tagline" id="detail-tagline"></div>
      <div class="detail-section" id="background-section">
        <div class="detail-section-title">この技法について</div>
        <div class="detail-background" id="detail-background"></div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">やってみよう</div>
        <div id="detail-steps-list"></div>
      </div>
      <div class="detail-section" id="tips-section">
        <div class="detail-section-title">コツ・ヒント</div>
        <ul class="tips-list" id="detail-tips"></ul>
      </div>
      <button class="done-btn" id="done-btn">✓ 完了した！</button>
    </div>
  </section>

  <!-- S8: Journal -->
  <section id="sc-journal" style="display:none">
    <div class="journal-wrap">
      <div class="screen-back">
        <button class="back-link" data-to="cards">← カードに戻る</button>
      </div>
      <div class="journal-tech-name" id="journal-tech-name"></div>
      <div class="journal-prompt">どうでしたか？</div>
      <div class="journal-warm" id="journal-warm"></div>
      <textarea class="journal-textarea" id="journal-textarea" placeholder="感じたこと、気づいたことを自由に…（入力しなくてもOK）"></textarea>
      <button class="journal-send-btn" id="journal-send-btn">Claude に気持ちを話す</button>
      <div class="journal-response" id="journal-response"></div>
      <button class="journal-skip-btn" id="journal-done-btn">終わりにする →</button>
    </div>
  </section>

  <!-- S9: Done -->
  <section id="sc-done" style="display:none">
    <div class="done-emoji">🌱</div>
    <div class="done-title">よくできました</div>
    <div class="done-msg" id="done-msg">一つ試せた。<br>それだけで今日は十分。</div>
    <button class="back-home-btn" id="back-home-btn">別のカードを見る</button>
  </section>

</div>

<script>
(function () {
  // ── Data ──
  let techniques = [];
  let contexts = {};

  // ── State ──
  const STATE = {
    direction: null,
    contextId: null,
    emotion: null,
    deck: [],
    currentTech: null,
    akiNode: 'root',
    akiStep: 0,
  };

  // ── Storage ──
  const S = {
    get: k => { try { return JSON.parse(localStorage.getItem('nm_' + k)); } catch { return null; } },
    set: (k, v) => { try { localStorage.setItem('nm_' + k, JSON.stringify(v)); } catch {} },
  };

  // ── Akinator tree ──
  const AKI = {
    root: {
      q: '今の体の感覚に近いのは？',
      opts: [
        { label: '緊張・ドキドキ・ざわざわしている', next: 'nodeA' },
        { label: 'だるい・重い・疲れた感じがある', next: 'nodeB' },
        { label: 'どちらとも言えない', grid: true },
      ],
    },
    nodeA: {
      q: 'その感覚はどちらに近い？',
      opts: [
        { label: 'ざわざわ・心配・どうしよう…という感じ', result: 'anxiety' },
        { label: 'イライラ・もどかしい・腹が立つ感じ', result: 'irritated' },
        { label: 'どちらとも言えない', grid: true },
      ],
    },
    nodeB: {
      q: '今の気持ちはどちらに近い？',
      opts: [
        { label: 'さみしい・誰かに会いたい・置いていかれた感じ', result: 'lonely' },
        { label: 'ただ重い・落ち込む・空っぽな感じ', next: 'nodeC' },
        { label: 'どちらとも言えない', grid: true },
      ],
    },
    nodeC: {
      q: 'もう少し絞ると？',
      opts: [
        { label: '空っぽ・何もない・麻痺している感じ', result: 'empty' },
        { label: '落ち込み・悲しい・疲れ果てた感じ', result: 'depressed' },
        { label: 'どちらとも言えない', grid: true },
      ],
    },
  };

  const EMOTION_INFO = {
    anxiety:   { ja: '不安・緊張',    icon: '😰' },
    irritated: { ja: 'イライラ',      icon: '😤' },
    lonely:    { ja: '孤独・さみしい', icon: '🥺' },
    empty:     { ja: '空虚・虚無',    icon: '😶' },
    depressed: { ja: '落ち込み・疲れ', icon: '😔' },
  };

  const EMOTION_KEYS = {
    anxiety:   ['anxiety'],
    irritated: ['irritated'],
    lonely:    ['lonely'],
    empty:     ['empty'],
    depressed: ['depressed', 'exhausted'],
  };

  // ── Template engine ──
  function t(text, vars) {
    if (!text || !vars) return text || '';
    return text.replace(/\{\{(\w+)\}\}/g, (_, k) => vars[k] !== undefined ? vars[k] : `{{${k}}}`);
  }

  function getCtxVars(ctxId) {
    return (ctxId && contexts[ctxId]?.i18n?.ja) || {};
  }

  function applyCtx(text, ctxId) {
    return t(text, getCtxVars(ctxId));
  }

  // ── Time ──
  function detectTimeSlot() {
    const h = new Date().getHours();
    if (h >= 5  && h < 11) return 'morning';
    if (h >= 11 && h < 14) return 'noon';
    if (h >= 14 && h < 18) return 'evening';
    if (h >= 18 && h < 23) return 'night';
    return 'midnight';
  }

  function timeGreeting(slot) {
    return { morning: 'おはよう ☀️', noon: 'こんにちは 🌤', evening: 'お疲れさま 🌇', night: 'こんばんは 🌙', midnight: 'まだ起きてるね 🌃' }[slot] || '';
  }

  // ── Streak ──
  function getWeekKey(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const mon = new Date(d.getFullYear(), d.getMonth(), diff);
    return mon.toISOString().slice(0, 10);
  }

  function recordVisit() {
    const today = new Date().toISOString().slice(0, 10);
    const lastVisit = S.get('last_visit');
    S.set('last_visit', today);
    const thisWeek = getWeekKey(new Date());
    let weeks = S.get('visited_weeks') || [];
    if (!weeks.includes(thisWeek)) { weeks.push(thisWeek); S.set('visited_weeks', weeks); }
    return lastVisit;
  }

  function getStreakWeeks() {
    const weeks = S.get('visited_weeks') || [];
    if (!weeks.length) return 0;
    const sorted = [...weeks].sort().reverse();
    let count = 0;
    let cur = getWeekKey(new Date());
    for (const w of sorted) {
      if (w === cur) {
        count++;
        const prev = new Date(cur);
        prev.setDate(prev.getDate() - 7);
        cur = getWeekKey(prev);
      } else break;
    }
    return count;
  }

  function getDaysSince(dateStr) {
    if (!dateStr) return null;
    return Math.floor((new Date() - new Date(dateStr)) / 86400000);
  }

  // ── Screen management ──
  const ALL_SCREENS = ['sc-welcome', 'sc-direction', 'sc-context', 'sc-akinator', 'sc-emotion', 'sc-cards', 'sc-detail', 'sc-journal', 'sc-done'];

  function show(id) {
    ALL_SCREENS.forEach(sid => {
      const el = document.getElementById(sid);
      if (el) el.style.display = sid === id ? 'flex' : 'none';
    });
    window.scrollTo(0, 0);
  }

  // ── Badge ──
  const BADGE = {
    'DBT': 'badge-dbt', 'CBT': 'badge-cbt', 'ACT': 'badge-act',
    'マインドフルネス': 'badge-mind', 'ポジティブ心理学': 'badge-positive',
    'セルフコンパッション': 'badge-self', '行動計画': 'badge-behavior', '記録': 'badge-record',
  };

  // ── Deck building ──
  function buildDeck() {
    const ctx = contexts[STATE.contextId];
    const applicable = ctx ? new Set(ctx.applicableTechniques) : null;
    const eKeys = EMOTION_KEYS[STATE.emotion] || [STATE.emotion];
    const slot = detectTimeSlot();

    let pool = (applicable
      ? techniques.filter(tc => applicable.has(tc.id))
      : [...techniques]
    ).sort(() => Math.random() - 0.5);

    const t1 = pool.filter(tc => eKeys.some(e => tc.emotions.includes(e)) && tc.timeSlots.includes(slot));
    const t2 = pool.filter(tc => eKeys.some(e => tc.emotions.includes(e)) && !tc.timeSlots.includes(slot));
    const t3 = pool.filter(tc => !eKeys.some(e => tc.emotions.includes(e)));

    const seen = new Set();
    return [...t1, ...t2, ...t3].filter(tc => seen.has(tc.id) ? false : seen.add(tc.id));
  }

  // ── Card element ──
  function buildCardEl(tc) {
    const el = document.createElement('div');
    el.className = 'technique-card';
    el.dataset.id = tc.id;
    const ja = tc.i18n?.ja || {};
    const vars = getCtxVars(STATE.contextId);
    const name = t(ja.name || tc.id, vars);
    const tagline = t(ja.tagline || '', vars);
    const steps = (ja.steps || []).map(s => t(s, vars));
    const firstStep = steps[0] ? (steps[0].length > 55 ? steps[0].slice(0, 55) + '…' : steps[0]) : '';
    const cls = BADGE[tc.approach] || 'badge-record';
    el.innerHTML = `
      <div class="swipe-hint-left">スキップ</div>
      <div class="swipe-hint-right">あとで</div>
      <span class="card-approach ${cls}">${tc.approach}</span>
      <div class="card-icon">${tc.icon}</div>
      <div class="card-name">${name}</div>
      <div class="card-tagline">${tagline}</div>
      <div class="card-step-preview">
        <div class="card-step-label">最初のステップ</div>
        <div class="card-step-text">${firstStep}</div>
      </div>
      <div class="card-footer">
        <span class="card-duration">⏱ 約${tc.duration}分 · 全${steps.length}ステップ</span>
        <span class="card-tap-hint">詳しく見る →</span>
      </div>`;
    return el;
  }

  // ── Card stack ──
  function renderStack() {
    const stack = document.getElementById('card-stack');
    const nav = document.getElementById('card-nav');
    const noMore = document.getElementById('no-more-msg');
    stack.innerHTML = '';
    noMore.style.display = 'none';
    if (STATE.deck.length === 0) {
      noMore.style.display = 'flex';
      if (nav) nav.style.display = 'none';
      return;
    }
    if (nav) nav.style.display = 'flex';
    [...STATE.deck.slice(0, 3)].reverse().forEach(tc => stack.appendChild(buildCardEl(tc)));
    const top = stack.querySelector('.technique-card:last-child');
    if (top) attachSwipe(top, () => openDetail(top.dataset.id));
  }

  function dismissTop(dir) {
    const top = document.querySelector('#card-stack .technique-card:last-child');
    if (!top) return;
    top.classList.add(dir === 'left' ? 'fly-left' : 'fly-right');
    STATE.deck.shift();
    setTimeout(() => { renderStack(); updateCardsMeta(); }, 420);
  }

  function updateCardsMeta() {
    const meta = document.getElementById('cards-meta');
    if (!meta) return;
    const vars = getCtxVars(STATE.contextId);
    const ctxLabel = vars.label || STATE.contextId || '';
    const emoInfo = EMOTION_INFO[STATE.emotion];
    meta.textContent = STATE.deck.length > 0
      ? `${ctxLabel} × ${emoInfo ? emoInfo.ja : (STATE.emotion || '')}（残り ${STATE.deck.length} 枚）`
      : '';
  }

  // ── Swipe ──
  function attachSwipe(card, onTap) {
    let sx = 0, sy = 0, dx = 0, dragging = false;
    const hL = card.querySelector('.swipe-hint-left');
    const hR = card.querySelector('.swipe-hint-right');
    const onStart = (x, y) => { sx = x; sy = y; dx = 0; dragging = true; card.classList.add('is-dragging'); };
    const onMove = (x, y) => {
      if (!dragging) return;
      dx = x - sx;
      const dy = y - sy;
      if (Math.abs(dx) < Math.abs(dy) * 0.5 && Math.abs(dx) < 20) return;
      card.style.transform = `translateX(${dx}px) rotate(${dx / 18}deg)`;
      const r = Math.min(Math.abs(dx) / 80, 1);
      hL.style.opacity = dx < 0 ? r : 0;
      hR.style.opacity = dx > 0 ? r : 0;
    };
    const onEnd = () => {
      if (!dragging) return;
      dragging = false;
      card.classList.remove('is-dragging');
      hL.style.opacity = 0; hR.style.opacity = 0;
      if (Math.abs(dx) >= 80) dismissTop(dx < 0 ? 'left' : 'right');
      else if (Math.abs(dx) < 15 && onTap) { card.style.transform = ''; onTap(); }
      else card.style.transform = '';
    };
    card.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    card.addEventListener('touchmove', e => { onMove(e.touches[0].clientX, e.touches[0].clientY); if (Math.abs(dx) > 10) e.preventDefault(); }, { passive: false });
    card.addEventListener('touchend', onEnd, { passive: true });
    card.addEventListener('touchcancel', onEnd, { passive: true });
    card.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', () => { if (dragging) onEnd(); });
  }

  // ── Detail screen ──
  function openDetail(id) {
    const tc = techniques.find(x => x.id === id);
    if (!tc) return;
    STATE.currentTech = id;
    const ja = tc.i18n?.ja || {};
    const vars = getCtxVars(STATE.contextId);
    const name = t(ja.name || id, vars);
    const tagline = t(ja.tagline || '', vars);
    const background = t(ja.background || '', vars);
    const steps = (ja.steps || []).map(s => t(s, vars));
    const tips = (ja.tips || []).map(tip => t(tip, vars));

    document.getElementById('detail-icon').textContent = tc.icon;
    document.getElementById('detail-name').textContent = name;
    document.getElementById('detail-tagline').textContent = tagline;
    document.getElementById('detail-duration').textContent = `⏱ 約${tc.duration}分`;
    const badge = document.getElementById('detail-badge');
    badge.className = `card-approach ${BADGE[tc.approach] || 'badge-record'}`;
    badge.textContent = tc.approach;

    const bgEl = document.getElementById('detail-background');
    const bgSec = document.getElementById('background-section');
    if (background) { bgEl.textContent = background; bgSec.style.display = ''; }
    else bgSec.style.display = 'none';

    const list = document.getElementById('detail-steps-list');
    list.innerHTML = steps.map((s, i) => `
      <div class="step-item" data-step="${i}">
        <div class="step-num"><span class="num">${i + 1}</span><span class="check">✓</span></div>
        <div class="step-text">${s}</div>
      </div>`).join('');
    list.querySelectorAll('.step-item').forEach(item => item.addEventListener('click', () => item.classList.toggle('done')));

    const tipsEl = document.getElementById('detail-tips');
    const tipsSec = document.getElementById('tips-section');
    if (tips.length) { tipsEl.innerHTML = tips.map(tip => `<li>${tip}</li>`).join(''); tipsSec.style.display = ''; }
    else tipsSec.style.display = 'none';

    document.getElementById('sc-detail').scrollTop = 0;
    show('sc-detail');
  }

  // ── Journal screen ──
  const WARM_MSGS = [
    '一つ試した。それだけで十分です。',
    '完璧じゃなくていい。ここにいてくれただけで大切。',
    '少しの一歩でも、止まっているより前にいる。',
    '難しくても試してくれた。それが大事です。',
    '波はまた来るけど、あなたには乗り越え方がある。',
    'ここに来てくれてよかった。それだけで十分。',
  ];

  function openJournal() {
    const tc = techniques.find(x => x.id === STATE.currentTech);
    const ja = tc?.i18n?.ja || {};
    const vars = getCtxVars(STATE.contextId);
    const name = t(ja.name || STATE.currentTech, vars);

    document.getElementById('journal-tech-name').textContent = `「${name}」を試しました`;
    document.getElementById('journal-warm').textContent = WARM_MSGS[Math.floor(Math.random() * WARM_MSGS.length)];
    document.getElementById('journal-textarea').value = '';
    const respEl = document.getElementById('journal-response');
    respEl.style.display = 'none';
    respEl.textContent = '';

    show('sc-journal');
  }

  async function submitJournal() {
    const userText = document.getElementById('journal-textarea').value.trim();
    if (!userText) return;

    const btn = document.getElementById('journal-send-btn');
    btn.disabled = true;
    btn.textContent = '送信中…';

    const tc = techniques.find(x => x.id === STATE.currentTech);
    const ja = tc?.i18n?.ja || {};
    const vars = getCtxVars(STATE.contextId);
    const name = t(ja.name || STATE.currentTech, vars);

    const respEl = document.getElementById('journal-response');
    respEl.style.display = 'block';
    respEl.textContent = '…';

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ techniqueName: name, userText }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      respEl.textContent = data.text || '（応答なし）';
    } catch (e) {
      respEl.textContent = '⚠️ 応答できませんでした: ' + e.message;
    }

    btn.disabled = false;
    btn.textContent = 'Claude に気持ちを話す';
  }

  function showDone() {
    const msgs = [
      '一つ試せた。それだけで今日は十分。',
      '完璧じゃなくていい。来てくれてよかった。',
      '小さな一歩が、積み重なっていく。',
      '今日もここに来てくれた。それだけで大切なこと。',
    ];
    document.getElementById('done-msg').innerHTML = msgs[Math.floor(Math.random() * msgs.length)].replace(/。/, '。<br>');
    show('sc-done');
  }

  // ── Welcome back ──
  function showWelcomeBack(lastVisit) {
    const days = getDaysSince(lastVisit);
    let emoji, title, msg;
    if (days === null || days <= 1) {
      [emoji, title, msg] = ['🌊', '戻ってきてくれた', 'また今日も、ここにいるね。'];
    } else if (days <= 6) {
      [emoji, title, msg] = ['🌿', `${days}日ぶりだね`, 'ちゃんと覚えてたよ。'];
    } else {
      [emoji, title, msg] = ['💛', 'おかえり', `${days}日ぶりだね。待ってたよ。\n来てくれてよかった。`];
    }
    document.getElementById('wb-emoji').textContent = emoji;
    document.getElementById('wb-title').textContent = title;
    document.getElementById('wb-msg').textContent = msg;

    const streak = getStreakWeeks();
    const streakEl = document.getElementById('wb-streak');
    if (streak >= 2) { streakEl.textContent = `🔥 ${streak}週連続`; streakEl.style.display = 'block'; }
    else if (streak === 1) { streakEl.textContent = '✨ 今週も来たね'; streakEl.style.display = 'block'; }
    else streakEl.style.display = 'none';

    show('sc-welcome');
  }

  // ── Akinator ──
  function showAkinator() {
    STATE.akiNode = 'root';
    STATE.akiStep = 0;
    renderAkiNode();
    show('sc-akinator');
  }

  function renderAkiNode() {
    const node = AKI[STATE.akiNode];
    if (!node) return;
    document.getElementById('aki-step').textContent = `ステップ ${STATE.akiStep + 1}`;
    document.getElementById('aki-question').textContent = node.q;
    const optsEl = document.getElementById('aki-options');
    optsEl.className = 'aki-options';
    optsEl.innerHTML = '';
    node.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = opt.grid ? 'aki-btn-neither' : 'aki-btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', () => {
        if (opt.result) {
          STATE.emotion = opt.result;
          showEmotionResult();
        } else if (opt.next) {
          STATE.akiNode = opt.next;
          STATE.akiStep++;
          renderAkiNode();
        } else if (opt.grid) {
          renderEmotionGrid();
        }
      });
      optsEl.appendChild(btn);
    });
  }

  function renderEmotionGrid() {
    document.getElementById('aki-step').textContent = '気持ちを選ぶ';
    document.getElementById('aki-question').textContent = '今の気持ちに近いものを選んでください';
    const optsEl = document.getElementById('aki-options');
    optsEl.className = 'aki-options aki-emo-grid';
    optsEl.innerHTML = '';
    Object.entries(EMOTION_INFO).forEach(([id, info]) => {
      const btn = document.createElement('button');
      btn.className = 'aki-emo-btn';
      btn.innerHTML = `<span class="aki-emo-icon">${info.icon}</span><span class="aki-emo-label">${info.ja}</span>`;
      btn.addEventListener('click', () => {
        STATE.emotion = id;
        showEmotionResult();
      });
      optsEl.appendChild(btn);
    });
  }

  function showEmotionResult() {
    const info = EMOTION_INFO[STATE.emotion] || { ja: STATE.emotion, icon: '❓' };
    document.getElementById('er-icon').textContent = info.icon;
    document.getElementById('er-label').textContent = info.ja;
    show('sc-emotion');
  }

  // ── Context screen ──
  function showContextScreen() {
    document.getElementById('context-label').textContent =
      STATE.direction === 'resist' ? '何に抵抗したい？' : 'どんな習慣を作りたい？';
    const grid = document.getElementById('context-grid');
    grid.innerHTML = '';
    Object.entries(contexts)
      .filter(([, ctx]) => ctx.direction === STATE.direction)
      .forEach(([id, ctx]) => {
        const vars = ctx.i18n?.ja || {};
        const btn = document.createElement('button');
        btn.className = 'context-btn';
        btn.innerHTML = `<span class="ctx-icon">${ctx.icon}</span><span class="ctx-label">${vars.label || id}</span>`;
        btn.addEventListener('click', () => {
          STATE.contextId = id;
          S.set('last_context', id);
          showAkinator();
        });
        grid.appendChild(btn);
      });
    show('sc-context');
  }

  // ── Init ──
  async function init() {
    // Load techniques
    if (window.__DATA__) {
      techniques = window.__DATA__.techniques || [];
    } else {
      try {
        const res = await fetch('./src/data.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        techniques = json.techniques || [];
      } catch (e) {
        console.error('Failed to load data', e);
        show('sc-cards');
        document.getElementById('card-nav').style.display = 'none';
        document.getElementById('load-error-msg').style.display = 'flex';
        return;
      }
    }

    // Load contexts
    contexts = window.__CONTEXTS__ || {};

    // Time greeting
    document.getElementById('app-time').textContent = timeGreeting(detectTimeSlot());

    // Streak / welcome back
    const lastVisit = recordVisit();
    if (lastVisit) showWelcomeBack(lastVisit);
    else show('sc-direction');

    // ── Event listeners ──

    // data-to back buttons
    document.querySelectorAll('[data-to]').forEach(btn => {
      btn.addEventListener('click', () => {
        const to = btn.dataset.to;
        if (to === 'direction') show('sc-direction');
        else if (to === 'context') showContextScreen();
        else if (to === 'akinator') showAkinator();
        else if (to === 'cards') show('sc-cards');
      });
    });

    // Welcome back
    document.getElementById('wb-start').addEventListener('click', () => show('sc-direction'));

    // Direction
    document.querySelectorAll('.direction-card').forEach(btn => {
      btn.addEventListener('click', () => {
        STATE.direction = btn.dataset.dir;
        showContextScreen();
      });
    });

    // Emotion result
    document.getElementById('er-confirm').addEventListener('click', () => {
      STATE.deck = buildDeck();
      renderStack();
      updateCardsMeta();
      show('sc-cards');
    });
    document.getElementById('er-retry').addEventListener('click', () => showAkinator());

    // Cards
    document.getElementById('nav-skip').addEventListener('click', () => dismissTop('left'));
    document.getElementById('nav-next').addEventListener('click', () => dismissTop('right'));
    document.getElementById('retry-btn').addEventListener('click', () => show('sc-direction'));
    document.addEventListener('keydown', e => {
      if (document.getElementById('sc-cards').style.display === 'none') return;
      if (e.key === 'ArrowLeft')  { e.preventDefault(); dismissTop('left'); }
      if (e.key === 'ArrowRight') { e.preventDefault(); dismissTop('right'); }
    });

    // Detail
    document.getElementById('detail-back-btn').addEventListener('click', () => show('sc-cards'));
    document.getElementById('done-btn').addEventListener('click', () => openJournal());

    // Journal
    document.getElementById('journal-send-btn').addEventListener('click', submitJournal);
    document.getElementById('journal-done-btn').addEventListener('click', () => showDone());

    // Done
    document.getElementById('back-home-btn').addEventListener('click', () => show('sc-cards'));
  }

  init();
})();
</script>
</body>
</html>
